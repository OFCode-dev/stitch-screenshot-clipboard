  <meta property="og:type" content="website">
  <meta property="og:title" content="Stitch Screenshot → Clipboard">
  <meta property="og:description" content="Capture long pages, stitch them into one PNG, and copy the result directly to your clipboard.">
  <meta property="og:url" content="https://ofcodedev.me/stitch-screenshot-clipboard/">

  <meta name="twitter:card" content="summary_large_image">

    window.location.replace('https://chromewebstore.google.com/detail/stitch-screenshot-clipboard/ldhpomojadcpocpghpdpinpmagjknfjh');
  </script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #111117;
      --text: #f6f5f8;
      --muted: #aaa7b2;
      --accent: #f50087;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(760px, 100%);
      text-align: center;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 28px;
      border-radius: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 50px);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <img src="store-assets/hero.png" alt="Stitch Screenshot → Clipboard">
    <h1>Stitch Screenshot → Clipboard</h1>
    <p>
      Redirecting to the Chrome Web Store.
      <a href="https://chromewebstore.google.com/detail/stitch-screenshot-clipboard/ldhpomojadcpocpghpdpinpmagjknfjh">Continue manually</a>.

  </main>
</body>
